services:
  - type: web
    name: stock-trading-backend
    env: docker
    rootDir: backend
    autoDeploy: true
    healthCheckPath: /api/trading
    envVars:
      - key: FRONTEND_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173,capacitor://localhost,ionic://localhost,https://stock-trading-frontend.onrender.com
      - key: SIMULATE_FEED
        value: "true"
      - key: POLYGON_SYMBOLS
        value: ^IXIC,AAPL,TSLA,MSFT,GOOGL,AMZN,NVDA,META,NFLX

  - type: web
    name: stock-trading-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_LIQUID_API_URL
        value: https://stock-trading-backend.onrender.com/api/trading
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: stock-trading-backend
          property: url
      - key: VITE_MARKET_FEED_WS_URL
        value: wss://stock-trading-backend.onrender.com/ws/stock-data