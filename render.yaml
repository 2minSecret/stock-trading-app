services:
  - type: web
    name: stock-trading-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: FRONTEND_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173,capacitor://localhost,ionic://localhost,https://stock-trading-frontend.onrender.com
      - key: SIMULATE_FEED
        value: "true"
      - key: POLYGON_SYMBOLS
        value: ^IXIC,AAPL,TSLA,MSFT,GOOGL,AMZN,NVDA,META,NFLX
      - key: API_BASE_URL
        value: https://stock-trading-backend-u6lk.onrender.com

  - type: web
    name: stock-trading-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://stock-trading-backend-u6lk.onrender.com/api/trading
      - key: VITE_MARKET_FEED_WS_URL
        value: wss://stock-trading-backend-u6lk.onrender.com/ws/stock-data
